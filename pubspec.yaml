name: zx_drive
description: ZX Drive - Telegram Powered Cloud Storage
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database (drift = SQLite, fully compatible)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Navigation
  go_router: ^13.2.0

  # Telegram API
  dio: ^5.4.3+1

  # File Handling
  file_picker: ^8.0.3
  open_file: ^3.3.2
  mime: ^1.0.5

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  iconsax: ^0.0.8

  # MTProto / TDLib
  tdlib: ^1.0.3                        # TDLib tdjson FFI bindings (Android .so bundled)
  flutter_secure_storage: ^9.2.2       # Encrypted session storage (replaces SharedPrefs for auth keys)

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.1.0
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets: 
    - .env
